spring:
  main:
    allow-bean-definition-overriding: true
  jackson:
    serialization:
      write-dates-as-timestamps: false  # LocalDateTime → ISO-8601 문자열로 직렬화
  servlet:
    multipart:
      max-file-size: 50MB       # 파일 1개 최대 크기
      max-request-size: 200MB   # 요청 전체 최대 크기
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# JWT 설정
app:
  jwt:
    secret: "bo-backoffice-ge-america-secret-key-256bit-secure-2026"
    expiration: 3600        # 1시간 (초)
    refresh-expiration: 604800  # 7일 (초)

# 파일 업로드 루트 경로
file:
  upload-root: "/uploads"

# 페이지 템플릿 TSX 파일 출력 경로
page-template:
  output-dir: "../bo/src/app/admin/generated"

# 로깅 설정
logging:
  level:
    com.ge.bo: DEBUG
    org.springframework.security: DEBUG
    # SQL 파라미터 실제 값 출력
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    # 트랜잭션 커밋/롤백 로그
    org.springframework.transaction: TRACE
    org.springframework.orm.jpa: DEBUG
